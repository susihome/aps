version: '3.8'

services:
  postgres:
    image: postgres:18
    container_name: aps-postgres
    environment:
      POSTGRES_DB: aps
      POSTGRES_USER: aps_user
      POSTGRES_PASSWORD: aps_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: aps-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: aps-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: aps_user
      RABBITMQ_DEFAULT_PASS: aps_pass

volumes:
  postgres_data:
